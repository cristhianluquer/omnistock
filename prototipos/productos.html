<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniStock - Productos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="navbar">
        <div class="navbar-content">
            <div class="navbar-brand">
                <h2>OmniStock</h2>
            </div>
            <nav class="navbar-menu">
                <a href="dashboard.html" class="nav-link">Inicio</a>
                <a href="productos.html" class="nav-link active">Productos</a>
                <a href="#" class="nav-link">Clientes</a>
                <a href="#" class="nav-link">Ventas</a>
                <a href="#" class="nav-link">Inventario</a>
            </nav>
            <div class="navbar-user">
                <span>Usuario: Admin</span>
                <button class="btn btn-sm btn-secondary">Salir</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Page Header -->
            <div class="page-header">
                <h1 class="page-title">Productos</h1>
                <div class="page-actions">
                    <button class="btn btn-secondary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="M21 21l-4.35-4.35"/>
                        </svg>
                        Buscar
                    </button>
                    <button class="btn btn-primary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        Nuevo Producto
                    </button>
                </div>
            </div>
            
            <!-- Filtros -->
            <div class="filters-bar">
                <select class="form-control">
                    <option>Categoría: Todas</option>
                    <option>Electrónica</option>
                    <option>Ropa</option>
                    <option>Alimentos</option>
                </select>
                <select class="form-control">
                    <option>Stock: Todos</option>
                    <option>Stock Bajo</option>
                    <option>Stock Normal</option>
                </select>
            </div>
            
            <!-- Tabla de Productos -->
            <div class="table-card">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Nombre</th>
                            <th>Categoría</th>
                            <th>Stock</th>
                            <th>Precio</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>PROD001</td>
                            <td>Laptop HP</td>
                            <td>Electrónica</td>
                            <td><span class="badge badge-success">15</span></td>
                            <td>$850.00</td>
                            <td>
                                <button class="btn-icon" title="Editar">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                    </svg>
                                </button>
                                <button class="btn-icon btn-icon-danger" title="Eliminar">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                        <polyline points="3 6 5 6 21 6"/>
                                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                    </svg>
                                </button>
                            </td>
                        </tr>
                        <tr>
                            <td>PROD002</td>
                            <td>Camiseta M</td>
                            <td>Ropa</td>
                            <td><span class="badge badge-success">50</span></td>
                            <td>$25.00</td>
                            <td>
                                <button class="btn-icon" title="Editar">✏️</button>
                                <button class="btn-icon btn-icon-danger" title="Eliminar">🗑️</button>
                            </td>
                        </tr>
                        <tr class="warning-row">
                            <td>PROD003</td>
                            <td>Arroz 1kg</td>
                            <td>Alimentos</td>
                            <td><span class="badge badge-warning">8 ⚠️</span></td>
                            <td>$3.00</td>
                            <td>
                                <button class="btn-icon" title="Editar">✏️</button>
                                <button class="btn-icon btn-icon-danger" title="Eliminar">🗑️</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
                
                <!-- Paginación -->
                <div class="pagination">
                    <button class="btn btn-sm btn-secondary" disabled>Anterior</button>
                    <span class="pagination-info">Página 1 de 5</span>
                    <button class="btn btn-sm btn-secondary">Siguiente</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
