<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | OmniStock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1565C0 0%, #1E88E5 50%, #42A5F5 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .login-card { background: #fff; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
        .login-title { color: #1565C0; font-weight: 900; font-size: 32px; letter-spacing: 3px; text-align: center; }
        .login-subtitle { color: #6B7280; font-size: 14px; text-align: center; margin-bottom: 36px; }
        .form-label { font-weight: 600; color: #374151; font-size: 14px; }
        .form-control { border: 1.5px solid #E5E7EB; border-radius: 10px; padding: 12px 16px; font-size: 14px; }
        .form-control:focus { border-color: #1565C0; box-shadow: 0 0 0 3px rgba(21,101,192,0.12); }
        .btn-login { background: #1565C0; color: #fff; border: none; border-radius: 10px; padding: 14px; font-weight: 700; font-size: 14px; letter-spacing: 1px; width: 100%; }
        .btn-login:hover { background: #0D47A1; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-title">OMNISTOCK</div>
        <div class="login-subtitle">Sistema de Gestión</div>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ 'success' if category == 'success' else 'danger' if category == 'error' else 'info' }} py-2 mb-3">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" name="usuario" class="form-control" placeholder="Ingrese su usuario" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="Ingrese su contraseña" required>
            </div>
            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label" for="remember" style="color:#6B7280;font-size:14px">Recordar sesión</label>
            </div>
            <button type="submit" class="btn-login">INGRESAR</button>
        </form>
    </div>
</body>
</html>
